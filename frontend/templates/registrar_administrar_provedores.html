<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Proveedores</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <nav>
    <button onclick="history.back()">⬅</button>
    <h1>Proveedor</h1>
    <button onclick="location.reload()">🔄</button>
  </nav>

  <div class="contenedor">
    <button class="btn-agregar" onclick="document.getElementById('formProveedor').scrollIntoView()">➕ Nuevo Proveedor</button>

    <form id="formProveedor">
      <h2>Registrar Proveedor</h2>

      <label for="nombre">Nombre del proveedor *</label>
      <input type="text" id="nombre" name="nombre" required placeholder="Ej. Suministros Globales S.A.">

      <label for="nit">NIT / Identificación *</label>
      <input type="text" id="nit" name="nit" required placeholder="Ej. 900123456-7">

      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" placeholder="Ej. contacto@proveedor.com">

      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" placeholder="Ej. +57 310 555 1234">

      <label for="direccion">Dirección</label>
      <textarea id="direccion" name="direccion" rows="2" placeholder="Ej. Calle 45 #12-34, Bogotá"></textarea>

      <label for="tipo">Tipo de proveedor *</label>
      <select id="tipo" name="tipo" required>
        <option value="">Seleccione...</option>
        <option value="insumos">Insumos</option>
        <option value="servicios">Servicios</option>
        <option value="tecnologia">Tecnología</option>
      </select>

      <div class="acciones">
        <button type="submit">Guardar</button>
        <button type="reset" class="cancelar">Cancelar</button>
      </div>
    </form>
  </div>

</body>
</html>
